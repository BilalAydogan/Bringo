<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bringo Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #09090b;
        color: #fafafa;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }
      main {
        max-width: 28rem;
        padding: 2rem;
        text-align: center;
        border: 1px solid #27272a;
        border-radius: 1rem;
        background: #111113;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
      }
      p {
        margin: 0;
        color: #a1a1aa;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Bringo is offline</h1>
      <p>The app shell is available, but the network connection is currently unavailable.</p>
    </main>
  </body>
</html>
